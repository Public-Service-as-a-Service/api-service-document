document:
  status-job:
    # Daily reconciliation: promote SCHEDULED → ACTIVE when validFrom is reached, and
    # ACTIVE/SCHEDULED → EXPIRED when validTo has passed. Distributed lock via ShedLock.
    cron: "0 5 0 * * *"
  reindex-job:
    # Backfill scheduler for document_data rows with missing extracted_text (V1_11 legacy) or
    # missing page_count/page_offsets for paged MIME types (V1_15). Distributed lock via ShedLock.
    # Disable by setting `enabled: false` — useful during the initial rollout to observe manually
    # before letting it run autonomously. `batch-size` caps rows per run so a single tick can't
    # hold the lock beyond the 10-minute lease.
    enabled: true
    cron: "0 */5 * * * *"
    batch-size: 50
  storage:
    # File content is stored in an S3-compatible object store (Garage in production,
    # MinIO in the IT suite). Endpoint/bucket/credentials must be provided via env.
    s3:
      endpoint:
      region: us-east-1
      bucket:
      access-key:
      secret-key:
      path-style-access: true
integration:
  eventlog:
    enabled: false
    connectTimeout: 5
    readTimeout: 30
logging:
  level:
    root: INFO
mdc:
  municipalityId:
    enabled: true
openapi:
  name: ${spring.application.name}
  title: ${spring.application.name}
  version: '@project.version@'
spring:
  application:
    name: api-document
  datasource:
    url: ${DATASOURCE_URL}
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      pool-name: document-pool
    type: com.zaxxer.hikari.HikariDataSource
  flyway:
    enabled: true
  jpa:
    properties:
      hibernate:
        format_sql: true
        auto_quote_keyword: true
        show_sql: false
      jakarta:
        persistence:
          schema-generation:
            database:
              action: validate
    show-sql: false
  servlet:
    multipart:
      max-file-size: 60MB
      max-request-size: 60MB
  elasticsearch:
    # Mandatory — free-text ?query= is served from ES. Provide via env in every environment
    # (including local dev; no embedded fallback). Password may be omitted for an anonymous cluster.
    uris: ${ELASTICSEARCH_URIS:}
    username: ${ELASTICSEARCH_USERNAME:}
    password: ${ELASTICSEARCH_PASSWORD:}
springdoc:
  swagger-ui:
    operationsSorter: alpha
