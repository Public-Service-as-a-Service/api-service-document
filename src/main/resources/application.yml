document:
  status-job:
    # Daily reconciliation: promote SCHEDULED → ACTIVE when validFrom is reached, and
    # ACTIVE/SCHEDULED → EXPIRED when validTo has passed. Distributed lock via ShedLock.
    cron: "0 5 0 * * *"
  storage:
    # Backends: jdbc (bytes in MariaDB LONGBLOB, legacy) or s3 (AWS S3 / MinIO / Garage).
    # See Stage 1 of the storage-migration plan.
    backend: jdbc
    s3:
      endpoint:
      region: us-east-1
      bucket:
      access-key:
      secret-key:
      path-style-access: true
integration:
  eventlog:
    enabled: false
    connectTimeout: 5
    readTimeout: 30
logging:
  level:
    root: INFO
mdc:
  municipalityId:
    enabled: true
openapi:
  name: ${spring.application.name}
  title: ${spring.application.name}
  version: '@project.version@'
spring:
  application:
    name: api-document
  datasource:
    url: ${DATASOURCE_URL}
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      pool-name: document-pool
    type: com.zaxxer.hikari.HikariDataSource
  flyway:
    enabled: true
  jpa:
    properties:
      hibernate:
        format_sql: true
        auto_quote_keyword: true
        show_sql: false
      jakarta:
        persistence:
          schema-generation:
            database:
              action: validate
    show-sql: false
  servlet:
    multipart:
      max-file-size: 60MB
      max-request-size: 60MB
springdoc:
  swagger-ui:
    operationsSorter: alpha
