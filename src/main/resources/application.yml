integration:
  eventlog:
    enabled: false
    connectTimeout: 5
    readTimeout: 30
logging:
  level:
    root: INFO
mdc:
  municipalityId:
    enabled: true
openapi:
  name: ${spring.application.name}
  title: ${spring.application.name}
  version: '@project.version@'
spring:
  application:
    name: api-document
  datasource:
    url: ${DATASOURCE_URL}
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      pool-name: document-pool
    type: com.zaxxer.hikari.HikariDataSource
  flyway:
    enabled: true
  jpa:
    properties:
      hibernate:
        format_sql: true
        auto_quote_keyword: true
        show_sql: false
      jakarta:
        persistence:
          schema-generation:
            database:
              action: validate
    show-sql: false
  servlet:
    multipart:
      max-file-size: 60MB
      max-request-size: 60MB
springdoc:
  swagger-ui:
    operationsSorter: alpha
